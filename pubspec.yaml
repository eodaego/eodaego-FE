name: eodaego
description: "A new Flutter project."
publish_to: "none"
version: 1.0.2+2
environment:
  sdk: ^3.9.2
dependencies:
  # Flutter SDK 및 다국어 지원
  flutter: # Flutter 앱 프레임워크
    sdk: flutter
  flutter_localizations: # Flutter 기본 위젯의 다국어 지원
    sdk: flutter
  cupertino_icons: ^1.0.8 # iOS 스타일 아이콘
  intl: ^0.20.2 # 날짜, 숫자 및 다국어 메시지 포맷
  # 라우팅 및 외부 연동
  go_router: ^17.0.1 # 화면 라우팅 및 내비게이션
  app_links: ^6.4.0 # 딥링크 URI 수신
  url_launcher: ^6.3.2 # 외부 URL 및 앱 실행
  share_plus: ^12.0.1 # 네이티브 공유 시트
  # 상태 관리 및 데이터 모델
  flutter_riverpod: ^2.6.1 # Riverpod 상태 관리
  riverpod_annotation: ^2.6.1 # Riverpod 코드 생성 어노테이션
  freezed_annotation: ^2.4.4 # 불변 데이터 클래스 어노테이션
  json_annotation: ^4.9.0 # JSON 직렬화 어노테이션
  # 네트워크 및 실시간 통신
  dio: ^5.9.0 # HTTP 클라이언트
  retrofit: 4.7.3 # REST API 클라이언트 생성, 4.9.x logError 호환성 이슈로 고정
  stomp_dart_client: ^3.0.1 # STOMP WebSocket 통신
  connectivity_plus: ^6.1.0 # 네트워크 연결 상태 확인
  # 인증, Firebase 및 알림
  google_sign_in: ^6.2.3 # Google 소셜 로그인
  sign_in_with_apple: ^6.1.3 # Apple 소셜 로그인
  firebase_core: ^3.15.2 # Firebase 초기화
  firebase_auth: ^5.7.0 # Firebase 인증
  firebase_remote_config: ^5.5.0 # 앱 버전 및 점검 모드 원격 설정
  firebase_messaging: ^15.2.10 # Firebase 푸시 알림
  firebase_crashlytics: ^4.3.10 # 크래시 및 오류 수집
  firebase_analytics: ^11.6.0 # 사용자 행동 분석
  flutter_local_notifications: ^19.4.2 # 로컬 알림 생성 및 관리
  # 로컬 데이터 및 기기 정보
  shared_preferences: ^2.3.4 # 테마 및 온보딩 등 로컬 설정 저장
  flutter_secure_storage: ^9.2.4 # 토큰 등 민감 데이터 보안 저장
  flutter_dotenv: ^6.0.0 # .env 환경 변수 로드
  uuid: ^4.5.2 # 고유 식별자 생성
  clock: ^1.1.2 # 테스트 가능한 현재 시간 제공
  package_info_plus: ^9.0.0 # 앱 버전 및 패키지 정보 조회
  device_info_plus: ^10.1.2 # 기기 정보 조회
  app_settings: ^7.0.0 # 운영체제 앱 설정 화면 열기
  # UI 및 사용자 피드백
  flutter_screenutil: ^5.9.3 # 화면 크기별 반응형 단위
  smooth_page_indicator: ^1.2.1 # 페이지 인디케이터
  toggle_switch: ^2.3.0 # 토글 스위치 UI
  flutter_svg: ^2.2.1 # SVG 이미지 렌더링
  tutorial_coach_mark: ^1.3.3 # 기능 안내 코치마크
  animations: ^2.1.1 # 화면 전환 애니메이션
  shimmer: ^3.0.0 # 로딩 스켈레톤 효과
  vibration: ^3.1.8 # 진동 피드백
  # 위치
  geolocator: ^14.0.2 # 위치 권한 및 현재 위치 조회
  # QR 코드
  qr_flutter: ^4.1.0 # QR 코드 생성
  mobile_scanner: ^7.2.0 # QR 및 바코드 스캔
  # 광고
  # google_mobile_ads: ^7.0.0 # Google AdMob 광고 (AdMob App ID 설정 전까지 임시 제외 — GADApplicationIdentifier 없으면 런치 크래시)
dev_dependencies:
  # 테스트 및 코드 품질
  flutter_test: # Flutter 테스트 프레임워크
    sdk: flutter
  mocktail: ^1.0.4 # Mock 객체 생성
  fake_async: ^1.3.3 # Timer 및 비동기 시간 제어
  flutter_lints: ^6.0.0 # Flutter 권장 린트 규칙
  # 코드 생성
  build_runner: ^2.4.14 # 코드 생성 작업 실행
  riverpod_generator: ^2.6.2 # Riverpod Provider 생성
  freezed: ^2.5.7 # 불변 데이터 클래스 생성
  json_serializable: ^6.9.2 # JSON 직렬화 코드 생성
  retrofit_generator: ^9.1.8 # Retrofit API 클라이언트 생성
  # 앱 설정 도구
  flutter_launcher_icons: ^0.14.4 # 앱 런처 아이콘 생성
  change_app_package_name: ^1.5.0 # 앱 패키지명 변경
flutter:
  uses-material-design: true
