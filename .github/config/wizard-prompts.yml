# @wizard ask 마커의 사용자 질문 문구.
# 형식 1 (구형, 지원 유지): KEY: "라벨"
# 형식 2 (신규 블록): KEY 아래 label/help/example 들여쓰기 2칸
# 형식 3 (타입 오버라이드): "{type}.KEY" 키로 타입별 문구 분리
# 조회 우선순위: {type}.KEY -> KEY -> 구형 -> 폴백(KEY명)
# 기본값/resolver는 여기 두지 않는다(@wizard 마커 소관).

PROJECT_NAME:
  label: "서비스 식별자 (영문 슬러그)"
  help: "Docker 컨테이너명·이미지명·배포 도메인 prefix에 그대로 사용됩니다. 소문자-하이픈 권장."
  example: "my-service"

flutter.APP_ARTIFACT_NAME:
  label: "앱 산출물 이름 (영문)"
  help: "빌드된 APK 파일명·아티팩트명·빌드 히스토리 파일명에 사용됩니다."
  example: "my-app"

SERVICE_DOMAIN:
  label: "서비스 도메인"
  help: "배포 후 외부에서 접속할 운영 도메인입니다. 실제 보유한 도메인으로 바꿔야 합니다."
  example: "api.example.com"

JAVA_VERSION:
  label: "빌드 JDK 버전"
  help: "GitHub Actions 빌드 러너의 JDK 버전입니다. Spring은 보통 21, Flutter Android는 17."
  example: "21"

DEPLOY_PORT:
  label: "외부 노출 포트"
  help: "호스트(서버)에서 컨테이너로 연결할 포트입니다. 다른 서비스와 겹치지 않게 정하세요."
  example: "8080"

VOLUME_HOST_PATH:
  label: "호스트(NAS) 볼륨 경로"
  help: "서버에 데이터를 영구 저장할 실제 디렉토리 경로입니다."
  example: "/volume1/projects/my-service"

VOLUME_CONTAINER_PATH:
  label: "컨테이너 내부 마운트 경로"
  help: "컨테이너 안에서 위 볼륨이 보일 위치입니다."
  example: "/mnt/my-service"

SSH_AUTH_METHOD:
  label: "SSH 인증 방식"
  help: "배포 서버 접속 방식입니다. 둘 중 하나를 그대로 입력하세요."
  example: "password 또는 key"

# workflow filename (partial match) -> human readable short name
# wizard uses this to build "[usage]" in env questions.
_workflow_names:
  NONSTOP-NGINX: "무중단배포(Nginx)"
  NONSTOP-TRAEFIK: "무중단배포(Traefik)"
  PR-PREVIEW: "PR 프리뷰"
  SIMPLE-CICD: "단일 서버 배포"
  REACT-CICD: "프론트 배포"
  REACT-CI: "프론트 빌드"
  NEXT-CICD: "프론트 배포"
  NEXT-CI: "프론트 빌드"
  PYTHON-CI: "빌드 검증"
  FLUTTER-ANDROID-SELFHOSTED: "안드로이드 자체배포"
  FLUTTER-ANDROID-PLAYSTORE: "플레이스토어 배포"
  FLUTTER-ANDROID-FIREBASE: "Firebase 배포"
